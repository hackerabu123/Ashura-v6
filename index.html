<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASURA ULTIMATE AI | Base64 Auth</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore-compat.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root { --primary: #bc9aff; --bg: #0a0b10; --card: #ffffff; }
        body { background: #f4f7ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .asura-card { background: var(--card); width: 350px; border-radius: 30px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        
        .scanner-header { position: relative; width: 170px; height: 170px; margin: 0 auto 15px; border-radius: 20px; border: 3px solid var(--primary); overflow: hidden; background: #000; box-shadow: 0 0 20px rgba(188, 154, 255, 0.3); }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: moveScan 2.5s infinite ease-in-out; z-index: 10; }
        @keyframes moveScan { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        .title { color: var(--primary); font-size: 1.5rem; font-weight: 800; text-transform: uppercase; margin: 10px 0; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .grid-item { border: 1px solid #f0f0f0; border-radius: 15px; padding: 12px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .grid-item:hover { border-color: var(--primary); background: #fafafa; }
        
        .input-group { margin-bottom: 12px; }
        .input-group input { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 12px; border: 1px solid #eee; outline: none; font-weight: bold; text-align: center; }
        
        .id-bar { background: #f9f9f9; border: 1px solid #eee; padding: 10px 15px; border-radius: 12px; font-size: 0.75rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .copy-btn { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(188, 154, 255, 0.4); text-transform: uppercase; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="asura-card">
        <div class="scanner-header">
            <div class="scan-line"></div>
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div class="title">Asura Ultimate AI</div>
        
        <div class="grid-container">
            <div class="grid-item" onclick="setMode('register')">Register</div>
            <div class="grid-item" onclick="setMode('login')">Login</div>
        </div>

        <div class="input-group">
            <input type="text" id="userName" placeholder="Enter Your Name">
        </div>

        <div class="id-bar">
            <span>ID: <strong id="devId">LOADING...</strong></span>
            <button class="copy-btn" id="copyBtn" onclick="copyID()">Copy</button>
        </div>

        <button class="btn-main" id="mainBtn" onclick="handleAuth()">
            <span id="btnText">Verify & Login</span>
        </button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBTTVVmV2J4A8QqG9gaTFjhTzDW6RqgNps",
            authDomain: "madara-62f7b.firebaseapp.com",
            databaseURL: "https://madara-62f7b-default-rtdb.firebaseio.com",
            projectId: "madara-62f7b",
            storageBucket: "madara-62f7b.firebasestorage.app",
            messagingSenderId: "282972851212",
            appId: "1:282972851212:web:64980ccdfa06b317357229"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentMode = 'login';
        const video = document.getElementById('video');

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                console.log("AI Models Loaded Successfully");
            } catch (e) { alert("Camera allow karo!"); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnText').innerText = (mode === 'register') ? "Register Face" : "Verify & Login";
        }

        function copyID() {
            navigator.clipboard.writeText(document.getElementById('devId').innerText);
            document.getElementById('copyBtn').innerText = "Copied!";
            setTimeout(() => document.getElementById('copyBtn').innerText = "Copy", 2000);
        }

        async function handleAuth() {
            const name = document.getElementById('userName').value;
            const deviceId = document.getElementById('devId').innerText;
            const btn = document.getElementById('mainBtn');

            if (!name) return alert("Pehle Name likho!");
            btn.disabled = true;
            document.getElementById('btnText').innerText = "Processing...";

            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Convert to Base64 (Compression 0.5 taaki database fast chale)
            const imageData = canvas.toDataURL('image/jpeg', 0.5);

            if (currentMode === 'register') {
                await db.collection("users").doc(deviceId).set({
                    name, deviceId, faceData: imageData, status: "pending", timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Registration Successful! Admin ke approval ka wait karein.");
            } else {
                const doc = await db.collection("users").doc(deviceId).get();
                if (!doc.exists) {
                    alert("User not found! Register karein.");
                } else if (doc.data().status !== "approved") {
                    alert("Admin ne abhi approve nahi kiya hai!");
                } else {
                    const liveDetection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                    if (!liveDetection) {
                        alert("Face nahi dikh raha!");
                    } else {
                        const img = await faceapi.fetchImage(doc.data().faceData);
                        const storedDetection = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        const distance = faceapi.euclideanDistance(liveDetection.descriptor, storedDetection.descriptor);
                        
                        if (distance < 0.6) {
                            alert("Access Granted! Welcome " + name);
                            // window.location.href = "success.html";
                        } else {
                            alert("Face match fail ho gaya!");
                        }
                    }
                }
            }
            btn.disabled = false;
            setMode(currentMode);
        }

        window.onload = () => { 
            init(); 
            document.getElementById('devId').innerText = "ASURA-" + Math.random().toString(36).substr(2, 9).toUpperCase(); 
        };
    </script>
</body>
</html>
